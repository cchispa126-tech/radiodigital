        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

            background: #0a0f1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            overflow-y: auto;
        }
        .radio-container {
            max-width: 950px;
            width: 100%;
            background: linear-gradient(145deg, #1a2634, #0d1420);
            border-radius: 50px;
            padding: 30px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.03);
            margin-top: 10px;
        }
        .volume-indicator {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.92);
            padding: 25px 35px;
            border-radius: 24px;
            color: #f1f5f9;
            font-size: 1.4rem;
            font-weight: 600;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.15s ease;
            pointer-events: none;
            border: 1px solid rgba(251, 191, 36, 0.2);
            text-align: center;
            min-width: 160px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
        }
        .volume-indicator.show { opacity: 1; }
        .volume-indicator .vol-icon { font-size: 2.5rem; display: block; margin-bottom: 5px; }
        .volume-indicator .vol-text { font-size: 1.2rem; letter-spacing: 1px; }
        .volume-indicator .vol-bar {
            width: 120px;
            height: 6px;
            background: #1e2a3a;
            border-radius: 6px;
            margin: 10px auto 0;
            overflow: hidden;
        }
        .volume-indicator .vol-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            border-radius: 6px;
            transition: width 0.05s linear;
        }
        .radio-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .radio-header .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .radio-header .brand h1 {
            color: #f1f5f9;
            font-size: 1.6rem;
            font-weight: 700;
        }
        .radio-header .brand h1 span {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .radio-header .brand .icon { font-size: 2rem; }
        .badge-internet {
            background: rgba(74, 222, 128, 0.15);
            color: #4ade80;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.65rem;
            font-weight: 600;
            border: 1px solid rgba(74, 222, 128, 0.2);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .badge-internet .dot {
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.7); }
        }
        .radio-display {
            background: #0d1420;
            border-radius: 24px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.04);
            flex-wrap: wrap;
        }
        .radio-display .logo {
            width: 90px;
            height: 90px;
            border-radius: 20px;
            background: #1a2634;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 3.2rem;
            border: 2px solid rgba(251, 191, 36, 0.15);
        }
        .radio-display .info { flex: 1; min-width: 120px; }
        .radio-display .info .name {
            color: #f1f5f9;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 2px;
        }
        .radio-display .info .freq { color: #94a3b8; font-size: 0.8rem; }
        .radio-display .info .status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
            font-size: 0.8rem;
            flex-wrap: wrap;
        }
        .radio-display .info .status .playing { color: #4ade80; }
        .radio-display .info .status .stopped { color: #94a3b8; }
        .radio-display .info .status .error { color: #ef4444; }
        .format-badge {
            display: inline-block;
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 0.6rem;
            font-weight: 600;
            border: 1px solid rgba(251, 191, 36, 0.1);
        }
        .channel-indicator {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
            background: #0d1420;
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .channel-indicator .nav-btn {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.15);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 60px;
            font-weight: 600;
        }
        .channel-indicator .nav-btn:hover {
            background: rgba(251, 191, 36, 0.2);
            transform: scale(1.02);
        }
        .channel-indicator .nav-btn:active { transform: scale(0.95); }
        .channel-indicator .counter {
            color: #94a3b8;
            font-size: 0.8rem;
            font-weight: 500;
            min-width: 50px;
            text-align: center;
        }
        .channel-indicator .counter span { color: #f1f5f9; font-weight: 700; }
        .selector-section { margin-bottom: 12px; }
        .selector-section select {

            padding: 12px 16px;
            background: #0d1420;
            color: #f1f5f9;

            border-radius: 16px;
            font-size: 0.9rem;
            font-weight: 500;

            background-position: right 16px center;

        .selector-section select:focus {
            border-color: #fbbf24;

        }
        .selector-section select option {

            color: #f1f5f9;
            padding: 10px;

        .audio-controls {

            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.04);

        }
        .audio-controls audio {

            height: 44px;
            border-radius: 40px;
            min-width: 120px;
        }
        .audio-controls audio::-webkit-media-controls-panel { background: #0d1420; }
        .audio-controls .btn-play {

            color: #0a0f1a;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;

            transition: all 0.2s;

            align-items: center;
            justify-content: center;
            flex-shrink: 0;

        }
        .audio-controls .btn-play:hover {

            color: #475569;
            border: 1px solid #1a2634;

            white-space: nowrap;
        }
        .radio-footer .count {
            color: #64748b;
            font-size: 0.65rem;
            background: #0d1420;
            padding: 4px 12px;

            border-radius: 14px;
            font-size: 0.7rem;
            margin-top: 10px;

            align-items: center;
            gap: 8px;

        .touch-hint {

            font-size: 0.55rem;
            text-align: center;
            margin-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.03);
            padding-top: 8px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px 12px;
        }
        .touch-hint span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .touch-hint .key {
            background: rgba(255,255,255,0.05);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.5rem;
            color: #94a3b8;
        }
        
        @media (max-width: 650px) {
            .radio-container { padding: 20px; border-radius: 30px; }
            .radio-display { flex-direction: column; align-items: center; text-align: center; padding: 16px; }
            .radio-display .logo { width: 70px; height: 70px; font-size: 2.5rem; }
            .radio-display .info .name { font-size: 1rem; }
            .audio-controls { flex-direction: column; align-items: stretch; border-radius: 30px; padding: 12px; }
            .audio-controls .btn-play { align-self: center; width: 44px; height: 44px; font-size: 1rem; }
            .radio-footer { flex-direction: column; align-items: stretch; }
            .radio-footer .url-box { white-space: normal; word-break: break-all; }
            .radio-header .brand h1 { font-size: 1.2rem; }
            .badge-internet { font-size: 0.55rem; padding: 4px 10px; }
            .touch-hint { font-size: 0.45rem; }
            .touch-hint span { margin: 0 2px; }
            .volume-indicator { padding: 14px 20px; font-size: 1rem; min-width: 120px; }
            .volume-indicator .vol-bar { width: 90px; }
        }
        @media (max-width: 400px) {
            .radio-container { padding: 12px; border-radius: 24px; }
            .radio-display .logo { width: 60px; height: 60px; font-size: 2rem; }
            .radio-display .info .name { font-size: 0.9rem; }
            .volume-indicator { padding: 12px 16px; font-size: 0.9rem; min-width: 100px; }
            .volume-indicator .vol-bar { width: 70px; }
        }

        <span class="count" id="stationCount">📻 65 emisoras</span>

    <div class="touch-hint">
        <span>⬆️⬇️ <span class="key">Volumen</span></span>
        <span>⬅️➡️ <span class="key">Canales</span></span>
        <span>👆👆 <span class="key">Play/Pausa</span></span>
        <span>⌨️ <span class="key">Flechas</span></span>

<script>
// ============================================================
// REPRODUCTOR CON SOPORTE HLS - 65 EMISORAS
// ============================================================

// ===== ELEMENTOS =====
const selector = document.getElementById('radioSelector');
const audioPlayer = document.getElementById('radioPlayer');
const sourceElem = document.getElementById('audioSource');
const playBtn = document.getElementById('playBtn');
const radioName = document.getElementById('radioName');
const radioFreq = document.getElementById('radioFreq');
const statusText = document.getElementById('statusText');
const logoContainer = document.getElementById('logoContainer');
const urlBox = document.getElementById('urlBox');
const stationCount = document.getElementById('stationCount');
const formatBadge = document.getElementById('formatBadge');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const channelCounter = document.getElementById('channelCounter');
const totalChannels = document.getElementById('totalChannels');

// ===== VOLUMEN INDICATOR =====
const volumeIndicator = document.getElementById('volumeIndicator');
const volIcon = document.getElementById('volIcon');
const volText = document.getElementById('volText');
const volBarFill = document.getElementById('volBarFill');

// ===== VARIABLES =====
let hls = null;
let isHlsStream = false;
let touchStartX = 0, touchStartY = 0, lastTapTime = 0;
let volumeTimeout = null;

// ===== INICIALIZACIÓN =====
const totalStations = selector.options.length - 1;
totalChannels.textContent = totalStations;
stationCount.textContent = `📻 ${totalStations} emisoras`;

// ===== FUNCIONES DE NAVEGACIÓN =====
function getCurrentIndex() { return selector.selectedIndex; }

function goToStation(index) {
    if (index >= 1 && index < selector.options.length) {
        selector.selectedIndex = index;
        updateDisplay();
        updateCounter();
    }
}

function nextStation() {
    const current = getCurrentIndex();
    goToStation(current + 1 < selector.options.length ? current + 1 : 1);
}

function prevStation() {
    const current = getCurrentIndex();
    goToStation(current - 1 >= 1 ? current - 1 : selector.options.length - 1);
}

function updateCounter() {
    const current = getCurrentIndex();
    channelCounter.innerHTML = `${current >= 1 ? current : '-'} / <span id="totalChannels">${totalStations}</span>`;
}

// ===== FUNCIONES DE VOLUMEN =====
function showVolume(volume) {
    const vol = Math.round(volume * 100);
    volText.textContent = vol + '%';
    volBarFill.style.width = vol + '%';
    if (vol === 0) volIcon.textContent = '🔇';
    else if (vol < 33) volIcon.textContent = '🔈';
    else if (vol < 66) volIcon.textContent = '🔉';
    else volIcon.textContent = '🔊';
    volumeIndicator.classList.add('show');
    clearTimeout(volumeTimeout);
    volumeTimeout = setTimeout(() => {
        volumeIndicator.classList.remove('show');
    }, 1200);
}

function changeVolume(delta) {
    let vol = audioPlayer.volume + delta;
    vol = Math.max(0, Math.min(1, vol));
    audioPlayer.volume = vol;
    showVolume(vol);
}

// ===== FUNCIÓN PRINCIPAL =====
function updateDisplay() {
    const selected = selector.options[selector.selectedIndex];
    const value = selected.value || '';
    const icon = selected.getAttribute('data-icon') || '📻';
    const freq = selected.getAttribute('data-freq') || '🌍 Disponible en todo el mundo';
    let name = selected.textContent.trim();
    name = name.replace(/^[🎵🌊📡📢🔊🎶🏛️⚡🌴🇳🇱🏝️🇮🇹🐐🏖️🇨🇱🌍🇦🇷🎷🇪🇸🇬🇷🇵🇱📻🌆🎶🎸🇻🇪🌬️]\s*/, '').trim();

    radioName.textContent = name || 'Selecciona una emisora';
    radioFreq.textContent = freq;
    logoContainer.textContent = icon;

    // Detener HLS anterior
    if (hls) {
        hls.destroy();
        hls = null;
        isHlsStream = false;
    }

    audioPlayer.pause();
    audioPlayer.currentTime = 0;
    audioPlayer.removeAttribute('src');
    sourceElem.src = '';

    if (value) {
        const isHls = value.includes('.m3u8') || value.includes('/HLS/');
        
        if (isHls && typeof Hls !== 'undefined' && Hls.isSupported()) {
            // ===== USAR HLS.JS =====
            isHlsStream = true;
            hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
            });
            hls.loadSource(value);
            hls.attachMedia(audioPlayer);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                audioPlayer.play().catch(() => {});
            });
            hls.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) {
                    console.error('❌ Error HLS:', data);
                    statusText.className = 'error';
                    statusText.textContent = '❌ Error HLS';
                    playBtn.textContent = '▶';
                }
            });
            statusText.className = 'playing';
            statusText.textContent = '📡 Cargando HLS...';
            formatBadge.textContent = 'HLS';
            urlBox.textContent = `🔗 ${value}`;
            urlBox.style.color = '#4ade80';
            updateCounter();
            return;
        } else if (isHls && audioPlayer.canPlayType('application/vnd.apple.mpegurl')) {
            // ===== SAFARI - SOPORTE NATIVO =====
            isHlsStream = true;
            audioPlayer.src = value;
            audioPlayer.play().catch(() => {});
            statusText.className = 'playing';
            statusText.textContent = '🔊 Reproduciendo HLS';
            formatBadge.textContent = 'HLS';
            urlBox.textContent = `🔗 ${value}`;
            urlBox.style.color = '#4ade80';
            updateCounter();
            return;
        }

        // ===== STREAM NORMAL (MP3/AAC) =====
        isHlsStream = false;
        sourceElem.src = value;
        audioPlayer.load();
        statusText.className = 'playing';
        statusText.textContent = '🔊 Cargando...';
        urlBox.textContent = `🔗 ${value}`;
        urlBox.style.color = '#4ade80';
        formatBadge.textContent = 'MP3';
        
        const playPromise = audioPlayer.play();
        if (playPromise !== undefined) {
            playPromise.then(() => {
                statusText.textContent = '🔊 Reproduciendo en vivo';
            }).catch(() => {
                statusText.textContent = '▶️ Haz clic en Play';
            });
        }
    } else {
        // ===== SIN SELECCIÓN =====
        statusText.className = 'stopped';
        statusText.textContent = selected.index > 0 ? '⏸️ Sin URL' : '⏸️ En espera';
        urlBox.textContent = selected.index > 0 ? '🔴 URL pendiente' : '🔗 Selecciona una emisora';
        urlBox.style.color = selected.index > 0 ? '#ef4444' : '#475569';
        formatBadge.textContent = selected.index > 0 ? '❓' : 'MP3';
        playBtn.textContent = '▶';
    }
    updateCounter();
}

// ===== EVENTOS =====
selector.addEventListener('change', updateDisplay);
prevBtn.addEventListener('click', prevStation);
nextBtn.addEventListener('click', nextStation);

playBtn.addEventListener('click', function() {
    if (audioPlayer.paused) {
        audioPlayer.play().catch(() => {});
    } else {
        audioPlayer.pause();
    }
});

// ===== EVENTOS DE AUDIO =====
audioPlayer.addEventListener('play', () => {
    playBtn.textContent = '⏸';
    if (!isHlsStream) {
        statusText.className = 'playing';
        statusText.textContent = '🔊 Reproduciendo en vivo';
    }
});

audioPlayer.addEventListener('pause', () => {
    playBtn.textContent = '▶';
    if (!isHlsStream && sourceElem.src) {
        statusText.className = 'stopped';
        statusText.textContent = '⏸️ Pausado';
    }
});

audioPlayer.addEventListener('error', () => {
    if (!isHlsStream) {
        statusText.className = 'error';
        statusText.textContent = '❌ Error al reproducir';
        playBtn.textContent = '▶';
    }
});

// ===== CONTROLES TÁCTILES =====
document.addEventListener('touchstart', function(e) {
    const touch = e.touches[0];
    touchStartX = touch.clientX;
    touchStartY = touch.clientY;
}, { passive: true });

document.addEventListener('touchmove', function(e) {
    e.preventDefault();
}, { passive: false });

document.addEventListener('touchend', function(e) {
    const touchEndX = e.changedTouches[0].clientX;
    const touchEndY = e.changedTouches[0].clientY;
    const diffX = touchStartX - touchEndX;
    const diffY = touchStartY - touchEndY;
    const absDiffX = Math.abs(diffX);
    const absDiffY = Math.abs(diffY);
    
    if (absDiffX < 30 && absDiffY < 30) {
        const now = Date.now();
        if (now - lastTapTime < 300 && lastTapTime > 0) {
            playBtn.click();
            lastTapTime = 0;
            return;
        }
        lastTapTime = now;
        return;
    }
    
    if (absDiffY > absDiffX && absDiffY > 40) {
        if (diffY > 0) changeVolume(0.08);
        else changeVolume(-0.08);
        return;
    }
    
    if (absDiffX > 50) {
        if (diffX > 0) nextStation();
        else prevStation();
    }
}, { passive: true });

// ===== TECLADO =====
document.addEventListener('keydown', function(e) {
    if (['INPUT', 'SELECT', 'TEXTAREA'].includes(e.target.tagName)) return;
    switch(e.key) {
        case 'ArrowUp': e.preventDefault(); changeVolume(0.1); showVolume(audioPlayer.volume); break;
        case 'ArrowDown': e.preventDefault(); changeVolume(-0.1); showVolume(audioPlayer.volume); break;
        case 'ArrowRight': e.preventDefault(); nextStation(); break;
        case 'ArrowLeft': e.preventDefault(); prevStation(); break;
        case ' ': e.preventDefault(); playBtn.click(); break;
    }
});

// ===== INICIAR =====
updateDisplay();

console.log(`📻 Radio Canarias - ${totalStations} emisoras disponibles`);
console.log('🎵 32 canarias + 5 chilenas + 2 griegas + 2 argentinas + 15 españolas + 2 polacas + 5 portuguesas + 2 alemanas + 3 zeno + 2 venezolanas');
console.log('🎧 ¡Disfruta de la radio!');
</script>
